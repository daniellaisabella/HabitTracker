services:
  backend:
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "pip install --no-cache-dir -r backend/requirements.txt && python -m backend.main"

  frontend:
    depends_on:
      - backend
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "pip install --no-cache-dir -r frontend/requirements.txt && streamlit run frontend/app.py --server.address=0.0.0.0 --server.port=8501"
    environment:
      - API_BASE=${API_BASE}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
    ports:
      - "8501:8501"

  db:
    image: postgres:14
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:

