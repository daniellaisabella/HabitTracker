name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install project dependencies
        run: |
          uv pip install --system --requirements requirements.txt

      - name: Lint with ruff
        run: |
          uv run ruff check .

      - name: Type check with pyright
        run: |
          uv run pyright

      - name: Run tests with pytest
        run: |
          uv run pytest
